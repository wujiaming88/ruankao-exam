name: Sync exam data from awesome-ruankao

on:
  repository_dispatch:
    types: [awesome-ruankao-updated]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout ruankao-exam
        uses: actions/checkout@v4

      - name: Checkout awesome-ruankao
        uses: actions/checkout@v4
        with:
          repository: wujiaming88/awesome-ruankao
          path: awesome-ruankao

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Parse questions
        run: node scripts/parse-questions.mjs
        env:
          AWESOME_RUANKAO_PATH: awesome-ruankao

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/data/exams.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/exams.json
          git commit -m "data: auto-sync from awesome-ruankao"
          git push
